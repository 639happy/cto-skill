name: Feature request
description: 建议一个保持轻量的新能力或改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 需要解决的问题
      description: 先描述实际摩擦，不要只描述想增加的流程
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 当前如何处理
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明为什么它不会让默认流程变重
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: 是否改变关键边界
      options:
        - 不改变
        - 改变 Superpowers 交接
        - 改变返回 CTO 条件
        - 改变开发前停止规则
    validations:
      required: true
