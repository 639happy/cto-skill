name: Feature request
description: 建议一个保持轻量的新能力或改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 需要解决的问题
      description: 先描述哪里不好用，不要只描述想增加什么流程
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 当前如何处理
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明它会怎样帮助用户，以及为什么不会让日常使用变复杂
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: 是否改变关键边界
      options:
        - 不改变
        - 改变怎样把工作交给 Superpowers
        - 改变什么时候要回到 CTO Skill
        - 改变开发前停止规则
    validations:
      required: true
