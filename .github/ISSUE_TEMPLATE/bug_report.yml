name: Bug report
description: 报告可复现的 CTO Skill 行为问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 感谢报告问题。请不要提交密钥、私人项目内容或个人信息。
  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: 使用的 Agent 产品、Superpowers 版本和操作系统
      placeholder: Claude Code, Superpowers 6.x, macOS
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: 怎样开始使用，以及交给它的任务
      description: 请提供脱敏后的调用方式和任务描述
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 怎样重复看到这个问题
      description: 提供脱敏后的提示信息、产物路径或最短操作步骤
    validations:
      required: true
