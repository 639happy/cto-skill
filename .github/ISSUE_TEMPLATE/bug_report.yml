name: Bug report
description: 报告可复现的 CTO Skill 行为问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 感谢报告问题。请不要提交密钥、私人项目内容或个人信息。
  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: Codex App/CLI、Superpowers 版本和操作系统
      placeholder: Codex App, Superpowers 6.1.1, macOS
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: 触发方式与任务
      description: 请提供脱敏后的显式调用和任务描述
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 可复现证据
      description: 提供脱敏日志、产物路径或最小复现步骤
    validations:
      required: true
